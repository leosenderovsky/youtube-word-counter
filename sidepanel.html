<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YT Word Counter</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>YT Word Counter</h1>
      <div class="controls">
        <select id="language-select">
          <option value="es">Español</option>
          <option value="en">English</option>
        </select>
        <button id="btn-reset" class="btn-icon" title="Resetear datos">🔄</button>
      </div>
    </header>

    <div id="status-banner" class="status live" style="display: none;">🔴 En vivo</div>

    <main>
      <div id="start-container">
        <button id="btn-start" class="btn primary">Iniciar Captura</button>
      </div>
      <div class="table-container" style="display: none;">
        <table id="word-table">
          <thead>
            <tr>
              <th>Palabra</th>
              <th>Frecuencia</th>
            </tr>
          </thead>
          <tbody id="word-tbody"></tbody>
        </table>
      </div>
      <div id="empty-state" class="empty-state" style="display: none;">
        Esperando subtítulos...
      </div>
    </main>

    <footer>
      <button id="btn-report" class="btn primary" style="display: none;">Generar Reporte Final</button>
      <div id="export-group" class="export-group hidden">
        <button id="btn-export-csv" class="btn secondary">CSV</button>
        <button id="btn-export-txt" class="btn secondary">TXT</button>
      </div>
    </footer>
  </div>
  <script src="sidepanel.js"></script>
</body>
</html>
